<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DATA PATH — 90日学習管理</title><style>
:root{--navy:#10264a;--blue:#3268d8;--line:#dce4ef;--bg:#f4f6f9;--muted:#66758c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#14243e;font-family:Arial,"Noto Sans JP",sans-serif}header{background:var(--navy);color:#fff;padding:28px 5vw;display:flex;justify-content:space-between;align-items:center}header h1{margin:0;font:26px Georgia}header p{margin:7px 0 0;color:#aebfd8;font-size:12px}.day{font:46px Georgia}.wrap{width:min(1100px,92%);margin:24px auto}.homeDashboard{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}.homePanel{background:#fff;border:1px solid var(--line);border-radius:9px;padding:20px;min-height:178px;display:flex;flex-direction:column}.homePanel h2{margin:0 0 12px}.homeValue{font:32px Georgia;color:var(--navy);margin-bottom:8px}.homeText{font-size:12px;line-height:1.7;color:var(--muted);flex:1}.homePanel button{align-self:flex-start;margin-top:14px;padding:9px 12px;border:1px solid var(--line);border-radius:5px;background:#fff;color:var(--blue);cursor:pointer}.homePanel button.primary{color:#fff}.taskPreview{margin:0;padding-left:18px;color:#14243e}.taskPreview li{margin:5px 0}.statusLead{color:#157347}.statusDelay{color:#b54708}.statusOnTrack{color:var(--blue)}.card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:22px;margin-bottom:18px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric b{display:block;font:28px Georgia;margin-top:8px}.metric small{color:var(--muted)}h2{font:20px Georgia;margin:0 0 16px}.schedule{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end}.schedule input,.schedule button{padding:10px;border:1px solid var(--line);border-radius:5px}.schedule button,.primary{background:var(--navy);color:#fff;border:0!important}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{background:#edf3fc!important;color:#40587a!important;padding:6px 9px!important;font-size:10px}.focus{background:linear-gradient(120deg,#10264a,#1a4c8e);color:#fff}.focus small{color:#b8c9e0}.nav{display:grid;grid-template-columns:38px 1fr 38px;align-items:center;gap:12px}.nav button{height:34px;border:1px solid #6d84a7;background:#fff;color:var(--navy);border-radius:5px}.nav b,.nav small{display:block}.tasks{margin-top:18px}.task{background:#fff;color:#14243e;border-radius:7px;padding:15px;margin:10px 0}.task label{display:flex;gap:11px;align-items:flex-start}.task input{width:20px;height:20px}.task em{font-style:normal;color:var(--blue);font-size:9px}.task b,.task span{display:block}.task span{font-size:11px;color:var(--muted);margin-top:4px}.task a{display:block;margin:10px 0 0 31px;background:#eef4fd;padding:9px;border-radius:5px;color:var(--blue);text-decoration:none;font-size:11px}.task code{display:block;color:#75839a;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.done{opacity:.58}.done b{text-decoration:line-through}.recovery{display:flex;justify-content:space-between;align-items:center;background:#fff2df;border:1px solid #f0d2a9;border-radius:6px;padding:12px;margin-top:14px}.reportGrid{display:grid;gap:14px}.reportField label{display:block;font-size:12px;font-weight:bold;margin-bottom:6px}.reportField textarea{width:100%;min-height:72px;resize:vertical;padding:11px;border:1px solid var(--line);border-radius:6px;font:14px/1.6 Arial,"Noto Sans JP",sans-serif;color:#14243e;background:#fff}.reportField textarea:focus{outline:2px solid #b9cdf5;border-color:var(--blue)}.reportActions{display:flex;align-items:center;gap:12px;margin-top:14px}.reportActions button{padding:10px 16px;border-radius:5px;cursor:pointer}.saveStatus{font-size:11px;color:var(--muted)}.logHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.logHeader h2{margin:0}.logCount{font-size:11px;color:var(--muted)}.logList{display:grid;gap:12px}.logEmpty{padding:18px;border:1px dashed var(--line);border-radius:7px;color:var(--muted);font-size:12px;text-align:center}.logItem{border:1px solid var(--line);border-radius:8px;padding:15px;background:#fff}.logItemHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.logItemHead b{font:18px Georgia}.logItemHead button{padding:7px 10px;border:1px solid var(--line);background:#fff;border-radius:5px;color:var(--blue);cursor:pointer}.logLines{display:grid;gap:8px}.logLine{font-size:12px;line-height:1.6}.logLine strong{color:var(--navy)}.footerActions{display:flex;gap:9px;flex-wrap:wrap}.footerActions button{padding:10px 13px;border:1px solid var(--line);background:#fff;border-radius:5px}input[type=file]{display:none}@media(max-width:700px){.homeDashboard{grid-template-columns:1fr}.summary,.schedule{grid-template-columns:1fr 1fr}.schedule>div:first-child{grid-column:1/3}.day{font-size:32px}}@media(max-width:460px){.summary,.schedule{grid-template-columns:1fr}.schedule>div:first-child{grid-column:1}.recovery{display:block}.recovery button{margin-top:8px}}
</style></head><body><header><div><h1>DATA PATH / 90</h1><p>教材を探さず、今日やることだけに集中する。</p></div><div class="day">DAY <span id="dayNum">1</span></div></header><main class="wrap"><section class="homeDashboard"><article class="homePanel"><h2>📊 今日のDay</h2><div id="homeTodayDay" class="homeValue">Day 1</div><div id="homeTodayText" class="homeText"></div><button id="openTodayBtn">今日の予定を開く</button></article><article class="homePanel"><h2>✅ 今日のタスク</h2><div id="homeNextDay" class="homeValue">Day 1</div><div id="homeTaskPreview" class="homeText"></div><button id="continueBtn" class="primary">学習を続ける →</button></article><article class="homePanel"><h2>📖 学習ログ</h2><div id="homeLogTitle" class="homeValue">未記録</div><div id="homeLogPreview" class="homeText">3行レポートを保存すると、最新の学びがここに表示されます。</div><button id="openLogsBtn">ログ一覧を見る</button></article></section><section class="summary"><div class="card metric"><small>完了した学習日</small><b id="completeDays">0日</b></div><div class="card metric"><small>現在の予定</small><b id="currentDay">Day 1</b></div><div class="card metric"><small>次の学習Day</small><b id="nextStudyMetric">Day 1</b></div><div class="card metric"><small>進行状況</small><b id="progressStatus">予定どおり</b></div></section><section class="card schedule"><div><h2>学習できない日を除外</h2><small>登録日はカウントせず、以降の教材を自動で後ろへ送ります。登録済み：<b id="skipCount">0日</b></small></div><div><input id="dateInput" type="date"><button id="addSkip">不可日に追加</button></div><div id="chips" class="chips"></div></section><section id="recovery" class="recovery"></section><section class="card focus"><div class="nav"><button id="prev">←</button><div><small id="phase"></small><h2 id="focus" style="margin:5px 0"></h2><small id="estimate"></small></div><button id="next">→</button></div><div id="tasks" class="tasks"></div></section><section class="card"><h2>📖 3行レポート（学習ログ）</h2><div class="reportGrid"><div class="reportField"><label for="report1">① 今日理解したこと</label><textarea id="report1" maxlength="500" placeholder="例：Power BIはデータをテーブルとして管理することを理解した。"></textarea></div><div class="reportField"><label for="report2">② 今日できるようになったこと</label><textarea id="report2" maxlength="500" placeholder="例：カード・円グラフ・横棒グラフを作成できた。"></textarea></div><div class="reportField"><label for="report3">③ 明日学ぶ・試したいこと</label><textarea id="report3" maxlength="500" placeholder="例：グラフ同士の連動とフィルター操作を試したい。"></textarea></div></div><div class="reportActions"><button id="saveReport" class="primary">このDayのレポートを保存</button><span id="saveStatus" class="saveStatus" aria-live="polite"></span></div></section><section class="card"><div class="logHeader"><h2>📚 学習ログ一覧</h2><span id="logCount" class="logCount"></span></div><div id="logList" class="logList"></div></section><section class="card"><h2>データ管理</h2><div class="footerActions"><button id="todayBtn" class="primary">今日の予定（Day）に戻る</button><button id="exportBtn">JSONをエクスポート</button><button id="importBtn">JSONをインポート</button><input id="fileInput" type="file" accept="application/json"></div><p style="font-size:10px;color:var(--muted)">進捗と3行レポートはこのブラウザ内に自動保存されます。定期的にJSONを保存してください。</p></section></main><script>
const KEY='data-path-local-v2',today=()=>new Date().toISOString().slice(0,10);let state=JSON.parse(localStorage.getItem(KEY)||'null')||{startDate:today(),completed:{},unavailable:[],reports:{}};state.completed=state.completed||{};state.unavailable=state.unavailable||[];state.reports=state.reports||{};let view=null;const R={pbi:['Microsoft Learn','https://learn.microsoft.com/ja-jp/training/powerplatform/power-bi/'],intro:['Microsoft Learn','https://learn.microsoft.com/ja-jp/training/paths/data-analytics-microsoft/'],prepare:['Microsoft Learn','https://learn.microsoft.com/ja-jp/training/paths/prepare-data-power-bi/'],model:['Microsoft Learn','https://learn.microsoft.com/ja-jp/training/paths/model-data-power-bi/'],report:['Microsoft Learn','https://learn.microsoft.com/ja-jp/training/modules/power-bi-effective-reports/'],sql:['SQLBolt','https://sqlbolt.com/lesson/'],python:['Kaggle Learn','https://www.kaggle.com/learn/python'],pandas:['Kaggle Learn','https://www.kaggle.com/learn/pandas'],viz:['Kaggle Learn','https://www.kaggle.com/learn/data-visualization'],colab:['Google Colab','https://colab.research.google.com/'],git:['Learn Git Branching','https://learngitbranching.js.org/?locale=ja'],github:['GitHub','https://github.com/']};function task(id,kind,title,detail,r,url){return{id,kind,title,detail,site:r[0],url:url||r[1]}}function plan(d){if(d<=3)return{phase:'Power BI',focus:'データ分析とPower BIの全体像',items:[task('a','公式教材',`Microsoft Data Analytics：モジュール ${d}/4`,'ラーニングパスを1モジュール修了する',R.intro),task('b','実践','Power BI Desktopで学んだ機能を確認','取得・変換・モデル・レポートの位置を確認',R.pbi),task('c','記録','学びを3行で記録','新機能／用途／疑問を各1行',R.pbi)]};if(d<=8)return{phase:'Power BI',focus:'データ取得とPower Query',items:[task('a','公式教材',`分析用データの準備：ブロック ${d-3}/5`,'取得→クリーンアップ→モデル選択の順に進める',R.prepare),task('b','実践','Excel・CSVを読み込み3つ以上変換','型変更・列分割・ピボット解除を試す',R.prepare),task('c','成果物',`powerbi-practice-day${d}.pbixを保存`,'変換手順名も整理する',R.github)]};if(d<=16){let t=['モデル構成','DAX式','計算列とメジャー','反復子関数','フィルターコンテキスト','タイムインテリジェンス','ビジュアル計算','モデル最適化'][d-9];return{phase:'Power BI',focus:t,items:[task('a','公式教材',t,'該当モジュールと知識チェックを完了',R.model),task('b','実践','今日のテーマでDAXを3本作成','式・期待値・実際の結果を検算',R.model),task('c','記録','DAXメモを保存','実務で使う場面を1つ書く',R.github)]}}if(d<=21)return{phase:'Power BI',focus:'コールセンターKPIダッシュボード',items:[task('a','公式教材','効果的なレポート設計','レイアウト・ビジュアル・フィルターを学ぶ',R.report),task('b','制作',['KPI定義','ワイヤーフレーム','データモデル','KPI可視化','仕上げ・README'][d-17],'架空データで1ページ完成へ進める',R.report),task('c','成果物','PBIXと画面画像を保存','GitHub公開用に整理',R.github)]};if(d<=35){let n=Math.min(18,d-21);return{phase:'SQL',focus:`SQLBolt Lesson ${n}`,items:[task('a','演習教材',`Lesson ${n}の全問題`,'説明を読み全問正解する',R.sql,R.sql[1]+n),task('b','実践','業務データを想定したSQLを1本作る','問い合わせ履歴への質問をSQL化',R.sql,R.sql[1]+n),task('c','成果物',`sql/day-${d}.sqlを保存`,'コメント付きでGitHub用に整理',R.github)]}}if(d<=40){let t=['Hello Python／関数','条件分岐','Lists','Loops','Strings and Dictionaries'][d-36];return{phase:'Python',focus:t,items:[task('a','Kaggle教材',t,'TutorialとExerciseを完了',R.python),task('b','Colab実践','見ずに例題を再現','エラーもメモする',R.colab),task('c','成果物',`python/day-${d}.ipynbを保存`,'ノートブックに考察を追加',R.colab)]}}if(d<=49)return{phase:'Python / Pandas',focus:'Pandasデータ処理',items:[task('a','Kaggle教材',`Pandas セクション ${d-40}/9`,'TutorialとExerciseを進める',R.pandas),task('b','Colab実践','問い合わせCSVを整形・集計','最低1つ変換し検算',R.colab),task('c','成果物','pandas-practice.ipynbを更新','今日の見出しを追加',R.github)]};if(d<=56)return{phase:'Python / 可視化',focus:'KPIの可視化',items:[task('a','Kaggle教材',`Data Visualization ${d-49}/7`,'TutorialとExerciseを完了',R.viz),task('b','制作','KPIグラフを2種類作成','時間帯別件数・応答率・AHTを候補にする',R.colab),task('c','成果物','グラフごとに考察を2行','何が分かるかを記載',R.github)]};if(d<=63)return{phase:'GitHub',focus:'Gitと成果物公開',items:[task('a','演習教材',`Git学習ブロック ${d-56}/7`,'基本→ブランチ→マージ→公開の順',R.git),task('b','実践','変更→コミットを1回実行','意味のあるメッセージを付ける',R.github),task('c','成果物','READMEを更新','目的・手順・結果・画像を載せる',R.github)]};let n=d-63,p=n<=9?'Power BI作品':n<=18?'SQL＋Python作品':'全作品の仕上げ',s=['目的定義','KPI設計','架空データ準備','データ整形','分析実装','可視化','検算と改善','README作成','最終確認'][(n-1)%9];return{phase:'Portfolio',focus:p,items:[task('a','今日の制作',s,'今日の完了条件まで進める',R.github),task('b','品質確認','目的・処理・結果・示唆を説明','第三者に伝わるか確認',R.github),task('c','公開',`Day ${d}としてコミット`,'READMEの進捗も更新',R.github)]}}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}function renderLogs(){let days=Object.keys(state.reports||{}).map(Number).filter(d=>d>=1&&d<=90).sort((a,b)=>b-a);logCount.textContent=days.length?`${days.length}日分を保存`:'保存済み 0日';if(!days.length){logList.innerHTML='<div class="logEmpty">3行レポートを保存すると、ここにDayごとの学習ログが表示されます。</div>';return}logList.innerHTML=days.map(d=>{let r=state.reports[String(d)]||{};return`<article class="logItem"><div class="logItemHead"><b>Day ${d}</b><button type="button" data-log-day="${d}">このDayを開く</button></div><div class="logLines"><div class="logLine"><strong>① 理解：</strong>${escapeHtml(r.line1||'未記入')}</div><div class="logLine"><strong>② できた：</strong>${escapeHtml(r.line2||'未記入')}</div><div class="logLine"><strong>③ 次に：</strong>${escapeHtml(r.line3||'未記入')}</div></div></article>`}).join('');logList.querySelectorAll('[data-log-day]').forEach(btn=>btn.onclick=()=>{view=Number(btn.dataset.logDay);render();window.scrollTo({top:0,behavior:'smooth'})})}function consecutiveCompleted(){let d=0;for(let i=1;i<=90;i++){if(complete(i))d=i;else break}return d}function nextStudyDay(){let done=consecutiveCompleted();return Math.min(90,done+1)}function progressInfo(cur){let done=consecutiveCompleted(),next=Math.min(90,done+1);if(done>=90)return{label:'90日完了',className:'statusLead'};if(next>cur){let days=next-cur-1;return days>0?{label:`${days}日前倒し`,className:'statusLead'}:{label:'予定どおり',className:'statusOnTrack'}}if(next<cur)return{label:`${cur-next}日遅れ`,className:'statusDelay'};return{label:'予定どおり',className:'statusOnTrack'}}function latestReportDay(){let days=Object.keys(state.reports||{}).map(Number).filter(d=>d>=1&&d<=90).sort((a,b)=>b-a);return days[0]||null}function renderHome(cur){let next=nextStudyDay(),info=progressInfo(cur),todayPlan=plan(cur),nextPlan=plan(next);homeTodayDay.textContent=`Day ${cur}`;homeTodayText.innerHTML=`<b>${escapeHtml(todayPlan.focus)}</b><br><span class="${info.className}">${info.label}</span>`;homeNextDay.textContent=consecutiveCompleted()>=90?'完了':`Day ${next}`;homeTaskPreview.innerHTML=consecutiveCompleted()>=90?'90日分の学習が完了しています。':`<b>${escapeHtml(nextPlan.focus)}</b><ol class="taskPreview">${nextPlan.items.map(x=>`<li>${escapeHtml(x.title)}</li>`).join('')}</ol>`;continueBtn.disabled=consecutiveCompleted()>=90;let latest=latestReportDay();if(latest){let r=state.reports[String(latest)]||{};homeLogTitle.textContent=`Day ${latest}`;homeLogPreview.textContent=r.line1||r.line2||r.line3||'保存済みレポートがあります。'}else{homeLogTitle.textContent='未記録';homeLogPreview.textContent='3行レポートを保存すると、最新の学びがここに表示されます。'}}function current(){let cal=Math.max(1,Math.floor((Date.now()-new Date(state.startDate+'T00:00:00'))/86400000)+1),skip=state.unavailable.filter(x=>x>=state.startDate&&x<=today()).length;return Math.min(90,Math.max(1,cal-skip))}function complete(d){return plan(d).items.every(x=>state.completed[d+'-'+x.id])}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function activeDay(){return view||current()}function renderReport(d){let report=state.reports[String(d)]||{line1:'',line2:'',line3:''};report1.value=report.line1||'';report2.value=report.line2||'';report3.value=report.line3||'';saveStatus.textContent=report.savedAt?`保存済み：${new Date(report.savedAt).toLocaleString('ja-JP')}`:''}function render(){let cur=current(),d=activeDay(),p=plan(d),rec=Array.from({length:Math.max(0,cur-1)},(_,i)=>i+1).filter(x=>!complete(x));dayNum.textContent=d;currentDay.textContent='Day '+cur;skipCount.textContent=state.unavailable.length+'日';nextStudyMetric.textContent=consecutiveCompleted()>=90?'完了':'Day '+nextStudyDay();let info=progressInfo(cur);progressStatus.textContent=info.label;progressStatus.className=info.className;completeDays.textContent=Array.from({length:90},(_,i)=>i+1).filter(complete).length+'日';phase.textContent=p.phase;focus.textContent=p.focus;estimate.textContent='目安 2〜4時間';prev.disabled=d===1;next.disabled=d===90;tasks.innerHTML=p.items.map(x=>{let k=d+'-'+x.id,v=!!state.completed[k];return`<div class="task ${v?'done':''}"><label><input type="checkbox" data-key="${k}" ${v?'checked':''}><div><em>${x.kind}</em><b>${x.title}</b><span>${x.detail}</span></div></label><a href="${x.url}" target="_blank"><strong>${x.site}を開く ↗</strong><code>${x.url}</code></a></div>`}).join('');tasks.querySelectorAll('input').forEach(x=>x.onchange=()=>{state.completed[x.dataset.key]=x.checked;save();render()});chips.innerHTML=state.unavailable.length?state.unavailable.map(x=>`<button class="chip" data-date="${x}">${x} ×</button>`).join(''):'<small>登録なし</small>';chips.querySelectorAll('button').forEach(x=>x.onclick=()=>{state.unavailable=state.unavailable.filter(y=>y!==x.dataset.date);save();render()});recovery.innerHTML=rec.length?`<div><b>未完了 ${rec.length}日</b><br><small>最優先：Day ${rec[0]}</small></div><button class="primary" id="recover">リカバリー開始 →</button>`:'<div><b>遅れはありません</b><br><small>現在の予定どおりです。</small></div>';let rb=document.getElementById('recover');if(rb)rb.onclick=()=>{view=rec[0];render()};renderReport(d);renderLogs();renderHome(cur)}
openTodayBtn.onclick=()=>{view=current();render();window.scrollTo({top:document.querySelector('.focus').offsetTop-12,behavior:'smooth'})};continueBtn.onclick=()=>{if(consecutiveCompleted()>=90)return;view=nextStudyDay();render();window.scrollTo({top:document.querySelector('.focus').offsetTop-12,behavior:'smooth'})};openLogsBtn.onclick=()=>document.getElementById('logList').scrollIntoView({behavior:'smooth',block:'start'});dateInput.value=today();addSkip.onclick=()=>{if(dateInput.value>=state.startDate&&!state.unavailable.includes(dateInput.value)){state.unavailable.push(dateInput.value);state.unavailable.sort();save();render()}};prev.onclick=()=>{view=Math.max(1,activeDay()-1);render()};next.onclick=()=>{view=Math.min(90,activeDay()+1);render()};todayBtn.onclick=()=>{view=null;render()};saveReport.onclick=()=>{let d=activeDay();state.reports[String(d)]={line1:report1.value.trim(),line2:report2.value.trim(),line3:report3.value.trim(),savedAt:new Date().toISOString()};save();renderReport(d);renderLogs();saveStatus.textContent=`Day ${d} のレポートを保存しました。`};exportBtn.onclick=()=>{let a=document.createElement('a');let url=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.href=url;a.download='data-path-progress-'+today()+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)};importBtn.onclick=()=>fileInput.click();fileInput.onchange=()=>{if(!fileInput.files[0])return;let r=new FileReader();r.onload=()=>{try{let imported=JSON.parse(r.result);state={startDate:imported.startDate||today(),completed:imported.completed||{},unavailable:imported.unavailable||[],reports:imported.reports||{}};save();render();alert('JSONを読み込みました')}catch{alert('JSONを読み込めませんでした')}finally{fileInput.value=''}};r.readAsText(fileInput.files[0])};render();
</script></body></html>
